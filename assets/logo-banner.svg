<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="Netforge">
  <title>Netforge — IPAM, topology, infrastructure</title>
  <defs>
    <linearGradient id="nf-hex-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="nf-shine-b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nf-word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <style>
      .wordmark { font: 700 56px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: -1.8px; }
      .tagline  { font: 500 13px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 3px; }
    </style>
  </defs>

  <!-- Hex icon, scaled up to ~96px, positioned left -->
  <g transform="translate(12, 22)">
    <path d="M 48 0 L 85.6 21.8 L 85.6 65.4 L 48 87.2 L 10.4 65.4 L 10.4 21.8 Z"
          fill="url(#nf-hex-b)" stroke="#0c4a6e" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 48 0 L 85.6 21.8 L 85.6 43.5 L 10.4 43.5 L 10.4 21.8 Z"
          fill="url(#nf-shine-b)"/>
    <g stroke="#ecfeff" stroke-width="4.5" stroke-linecap="round" fill="none">
      <line x1="30.4" y1="29.4" x2="30.4" y2="58"/>
      <line x1="30.4" y1="58"   x2="65.6" y2="29.4"/>
      <line x1="65.6" y1="29.4" x2="65.6" y2="58"/>
    </g>
    <g fill="#ecfeff" stroke="#0e7490" stroke-width="1.2">
      <circle cx="30.4" cy="29.4" r="5.2"/>
      <circle cx="30.4" cy="58"   r="5.2"/>
      <circle cx="65.6" cy="29.4" r="5.2"/>
      <circle cx="65.6" cy="58"   r="5.2"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <text x="122" y="84"  class="wordmark" fill="url(#nf-word)">netforge</text>
  <text x="124" y="112" class="tagline"  fill="#64748b">IPAM · TOPOLOGY · INFRASTRUCTURE</text>
</svg>
