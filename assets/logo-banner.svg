<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Netforge">
  <title>Netforge — IPAM, topology, infrastructure</title>
  <style>
    .wordmark { font: 700 52px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: -1.5px; }
    .tagline  { font: 500 13px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 3px; }
  </style>

  <!-- Icon: 4 nodes forming an "N" graph -->
  <g transform="translate(18, 26)">
    <g fill="none" stroke="#0891b2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="10" y1="10" x2="10" y2="58"/>
      <line x1="10" y1="58" x2="58" y2="10"/>
      <line x1="58" y1="10" x2="58" y2="58"/>
    </g>
    <g fill="#0891b2">
      <circle cx="10" cy="10" r="7"/>
      <circle cx="10" cy="58" r="7"/>
      <circle cx="58" cy="10" r="7"/>
      <circle cx="58" cy="58" r="7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="112" y="72" class="wordmark" fill="#0891b2">netforge</text>

  <!-- Tagline -->
  <text x="114" y="97" class="tagline" fill="#64748b">IPAM · TOPOLOGY · INFRASTRUCTURE</text>
</svg>
