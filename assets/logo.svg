<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Netforge logo">
  <title>Netforge</title>
  <defs>
    <linearGradient id="nf-hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="nf-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon: forged-metal container -->
  <path d="M 32 3 L 57 17.5 L 57 46.5 L 32 61 L 7 46.5 L 7 17.5 Z"
        fill="url(#nf-hex)"
        stroke="#0c4a6e"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Soft top highlight for a polished, forged-metal feel -->
  <path d="M 32 3 L 57 17.5 L 57 32 L 7 32 L 7 17.5 Z"
        fill="url(#nf-shine)"/>

  <!-- Inner "N" network graph: 4 nodes + 3 edges -->
  <g stroke="#ecfeff" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="22" y1="22" x2="22" y2="44"/>
    <line x1="22" y1="44" x2="42" y2="22"/>
    <line x1="42" y1="22" x2="42" y2="44"/>
  </g>
  <g fill="#ecfeff" stroke="#0e7490" stroke-width="1">
    <circle cx="22" cy="22" r="3.6"/>
    <circle cx="22" cy="44" r="3.6"/>
    <circle cx="42" cy="22" r="3.6"/>
    <circle cx="42" cy="44" r="3.6"/>
  </g>
</svg>
